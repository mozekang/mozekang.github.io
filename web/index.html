<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ece9e3">
    <title>在做什么</title>
    <style>
      html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#ece9e3}
      .shell{box-sizing:border-box;width:min(760px,100%);height:100dvh;max-width:100vw;margin:0 auto;overflow:hidden}
      @media(max-width:600px){.shell{width:100%;height:100svh;max-width:100vw}}
    </style>
    <link rel="stylesheet" href="./styles.css?v=20260619-2">
  </head>
  <body>
    <main class="shell">
      <section class="top-section">
        <div class="date-lockup">
          <strong id="dayNumber">--</strong>
          <div>
            <span id="weekdayLabel">---</span>
            <span id="timeLabel">--:--</span>
          </div>
        </div>

        <section class="goals-panel">
          <div id="goalInputs" class="goal-inputs" aria-label="今日目标">
            <input class="goal-input" type="text" autocomplete="off" maxlength="80" placeholder="目标 1">
            <input class="goal-input" type="text" autocomplete="off" maxlength="80" placeholder="目标 2">
            <input class="goal-input" type="text" autocomplete="off" maxlength="80" placeholder="目标 3">
          </div>
        </section>
        <div id="goalPrompt" class="goal-prompt hidden">新的一天，先定今天的方向。</div>
      </section>

      <section class="input-section">
        <input id="activityInput" class="activity-input" type="text" autocomplete="off" maxlength="120" aria-label="快速记录" placeholder="正在做什么？一句话就够。">
        <button id="saveButton" class="primary-button" aria-label="保存记录"><span id="saveLabel">→</span></button>
      </section>

      <section class="lower-section">
        <div id="timelineCanvas" class="timeline-canvas" aria-label="能量走势"></div>
        <div id="timelineDetail" class="timeline-detail hidden"></div>

        <section id="mainView" class="summary-section">
          <article class="metric metric-current">
            <button id="scoreGuideButton" class="score-guide-button" type="button">i</button>
            <span>当前</span>
            <strong id="currentEnergy">--</strong>
          </article>
          <article class="metric metric-trend">
            <span>趋势</span>
            <strong id="trendValue">--</strong>
          </article>
          <button id="openRecordsButton" class="metric metric-forward" type="button">
            <span>推进</span>
            <strong id="forwardCount">0</strong>
          </button>
        </section>
      </section>

      <section id="recordsView" class="records-section hidden">
        <div class="records-heading">
          <button id="backToMainButton" class="secondary-button" type="button">返回</button>
          <h2>过往记录</h2>
          <span id="syncStatus"></span>
        </div>
        <div id="recentList" class="recent-list"></div>
      </section>

      <div id="scoreGuide" class="score-guide hidden">
        <div class="score-guide-panel">
          <button id="closeScoreGuide" class="guide-close" aria-label="关闭评分说明">×</button>
          <h2>评分标准</h2>
          <p><strong>60 分</strong>：方向明确，继续这样做，生活会稳定往前走。</p>
          <p><strong>80 分</strong>：正在突破舒适区，持续一段时间会升级你的结构。</p>
          <p><strong>100 分</strong>：接近当前极限，是少数能改变生命层级的状态。</p>
          <p><strong>低于 40 分</strong>：大概率在消耗、逃避或失控，需要尽快换轨。</p>
        </div>
      </div>
    </main>
    <script src="./config.js?v=20260619-2"></script>
    <script src="./app.js?v=20260619-2"></script>
  </body>
</html>
