<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090705" />
    <title>聚会体验反馈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="screen is-active intro-screen" data-screen="intro" aria-labelledby="intro-title">
        <div class="intro-copy">
          <h1 id="intro-title" class="home-title">
            <span>一年</span>
            <span>只有52次</span>
            <span>改进机会</span>
          </h1>
          <p class="home-subtitle">我会重视每一条反馈</p>
        </div>
        <button class="primary-action intro-action" type="button" data-action="start">
          <span>帮助改进</span>
          <span class="action-icon" aria-hidden="true"></span>
        </button>
      </section>

      <section class="screen identity-screen" data-screen="identity" aria-labelledby="identity-title">
        <div class="screen-head">
          <h2 id="identity-title">你的称呼</h2>
        </div>
        <div class="identity-grid" data-role="identity-list"></div>
        <p class="inline-hint" data-role="identity-hint" aria-live="polite"></p>
      </section>

      <section class="screen" data-screen="q1" aria-labelledby="q1-title">
        <div class="question-card">
          <div class="screen-head">
            <h2 id="q1-title" class="question-title">
              <span>今晚哪个部分</span>
              <span>对你来说最加分？</span>
            </h2>
          </div>
          <div class="option-grid" data-role="q1-options"></div>
          <p class="inline-hint" data-role="q1-hint" aria-live="polite"></p>
        </div>
      </section>

      <section class="screen" data-screen="q2" aria-labelledby="q2-title">
        <div class="question-card">
          <div class="screen-head">
            <h2 id="q2-title" class="question-title">
              <span>今晚哪个部分</span>
              <span>让你没那么舒服？</span>
            </h2>
          </div>
          <div class="option-grid" data-role="q2-options"></div>
          <p class="inline-hint" data-role="q2-hint" aria-live="polite"></p>
        </div>
      </section>

      <section class="screen" data-screen="q3" aria-labelledby="q3-title">
        <div class="question-card">
          <div class="screen-head">
            <h2 id="q3-title" class="question-title">你感觉下次还想来吗？</h2>
          </div>
          <div class="option-grid single" data-role="q3-options"></div>
          <div class="factor-panel" data-role="factor-panel" hidden>
            <p>主要影响因素</p>
            <div class="factor-grid" data-role="factor-options"></div>
          </div>
          <p class="inline-hint" data-role="q3-hint" aria-live="polite"></p>
        </div>
      </section>

      <section class="screen" data-screen="open" aria-labelledby="open-title">
        <div class="question-card open-question-card">
          <div class="screen-head">
            <h2 id="open-title" class="question-title open-title">
              <span>最后</span>
              <span>今晚如果只能留下</span>
              <span>一个画面 / 一句话 /</span>
              <span>一个感受 / 一个脑洞</span>
              <span>你会留下什么？</span>
            </h2>
          </div>
          <textarea
            class="moment-input"
            data-role="moment-input"
            maxlength="600"
            rows="1"
            placeholder=""
          ></textarea>
          <p class="inline-hint" data-role="open-hint" aria-live="polite"></p>
        </div>
      </section>

      <section class="screen success-screen" data-screen="success" aria-labelledby="success-title">
        <div class="success-content">
          <div class="projector-line" aria-hidden="true"></div>
          <p class="step-label">SENT</p>
          <h2 id="success-title">收到<span class="tight-period">。</span></h2>
          <div class="success-details">
            <p>
              <span>我希望为你打造出</span>
              <span>这个城市最舒服的聚会</span>
            </p>
            <p class="success-note">期待下次见</p>
            <img class="success-logo" src="./logo.png" alt="" onerror="this.hidden=true" />
          </div>
        </div>
      </section>
    </main>

    <button class="side-arrow side-arrow-left" type="button" data-action="side-prev" aria-label="上一页"></button>
    <button class="side-arrow side-arrow-right" type="button" data-action="side-next" aria-label="下一页"></button>

    <script src="./config.js"></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
